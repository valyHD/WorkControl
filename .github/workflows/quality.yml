name: Quality

on:
  push:
    branches:
      - main
      - "chore/**"
  pull_request:

jobs:
  quality:
    name: Lint, test, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Functions dependencies
        run: npm --prefix functions ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:run

      - name: Functions and gateway tests
        run: npm run test:functions

      - name: Build
        run: npm run build
